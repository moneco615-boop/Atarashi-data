<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atarashi MASTER — Panel de Control V4.0 (Cloudinary + GitHub)</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght=400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --negro-fondo: #0a0a0a;
    --negro-tarjeta: #121212;
    --negro-panel: #181818;
    --dorado: #C9A02A;
    --dorado-brillante: #F0C040;
    --blanco: #F5F2EA;
    --gris: #888880;
    --fuente-titulo: 'Bebas Neue', sans-serif;
    --fuente-cuerpo: 'Outfit', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--negro-fondo);
    font-family: var(--fuente-cuerpo);
    color: var(--blanco);
    padding: 20px 12px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 25px;
    padding-bottom: 15px;
    border-bottom: 1px solid rgba(201,160,42,0.1);
  }
  header h1 {
    font-family: var(--fuente-titulo);
    font-size: 42px;
    letter-spacing: 4px;
    color: var(--blanco);
  }
  header h1 span { color: var(--dorado); }
  header p { font-size: 14px; color: var(--gris); margin-top: 5px; }

  .contenedor-master {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr;
    gap: 30px;
  }
  @media(min-width: 900px) {
    .contenedor-master { grid-template-columns: 400px 1fr; }
  }

  .panel-formulario {
    background: var(--negro-panel);
    border: 1px solid var(--dorado);
    border-radius: 12px;
    padding: 20px;
    height: fit-content;
    position: sticky;
    top: 20px;
  }
  .panel-formulario h2 {
    font-family: var(--fuente-titulo);
    font-size: 26px;
    letter-spacing: 1px;
    margin-bottom: 15px;
    color: var(--dorado);
  }
  
  .caja-admin-categorias {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(201,160,42,0.2);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 20px;
  }
  .caja-admin-categorias h3 {
    font-size: 13px;
    text-transform: uppercase;
    color: var(--dorado);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .lista-tags-categorias {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .tag-cat {
    background: #0d0d0d;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-borrar-cat {
    background: none;
    border: none;
    color: #ff4d4d;
    cursor: pointer;
    font-weight: bold;
    font-size: 12px;
  }
  .form-nueva-cat {
    display: flex;
    gap: 4px;
  }

  .grupo-campo { margin-bottom: 12px; }
  .grupo-campo label {
    display: block;
    font-size: 12px;
    color: var(--gris);
    margin-bottom: 5px;
    text-transform: uppercase;
  }
  .grupo-campo input, .grupo-campo select, .grupo-campo textarea {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid rgba(201,160,42,0.3);
    color: #fff;
    padding: 8px 10px;
    border-radius: 6px;
    font-family: var(--fuente-cuerpo);
    font-size: 13px;
    outline: none;
  }
  .grupo-campo input:focus, .grupo-campo select:focus {
    border-color: var(--dorado-brillante);
  }
  
  .caja-paso-uno {
    background: rgba(201,160,42,0.05);
    border: 1px dashed rgba(201,160,42,0.3);
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 15px;
  }

  .fila-precios {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    background: rgba(0,0,0,0.2);
    padding: 10px;
    border-radius: 6px;
    margin-top: 5px;
  }

  .btn-primario {
    width: 100%;
    background: var(--dorado);
    color: #000;
    border: none;
    padding: 12px;
    border-radius: 6px;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    text-transform: uppercase;
    margin-top: 10px;
    transition: background 0.2s;
  }
  .btn-primario:hover { background: var(--dorado-brillante); }

  .btn-descargar {
    width: 100%;
    background: #155724;
    color: #d4edda;
    border: 1px solid #c3e6cb;
    padding: 12px;
    border-radius: 6px;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    text-transform: uppercase;
    margin-top: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-descargar:hover { background: #1e7e34; }

  .panel-lista h2 {
    font-family: var(--fuente-titulo);
    font-size: 28px;
    letter-spacing: 2px;
    margin-bottom: 20px;
    border-bottom: 1px solid rgba(201,160,42,0.1);
    padding-bottom: 5px;
  }
  .tabla-productos {
    width: 100%;
    border-collapse: collapse;
    background: var(--negro-tarjeta);
    border-radius: 8px;
    overflow: hidden;
  }
  .tabla-productos th, .tabla-productos td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }
  .tabla-productos th {
    background: rgba(201,160,42,0.1);
    color: var(--dorado);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 1px;
  }
  .mini-img {
    width: 45px;
    height: 45px;
    object-fit: contain;
    background: #1a1a1a;
    border-radius: 4px;
    border: 1px solid rgba(201,160,42,0.2);
  }
  .btn-tabla {
    color: #fff;
    border: none;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    margin-right: 4px;
  }
  .btn-editar { background: #0056b3; }
  .btn-editar:hover { background: #004085; }
  .btn-eliminar { background: #721c24; }
  .btn-eliminar:hover { background: #bd2130; }

  .preview-fotos-caja { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .preview-foto-wrapper {
    position: relative;
    width: 60px; height: 60px;
    flex-shrink: 0;
  }
  .preview-mini-foto {
    width: 100%; height: 100%;
    object-fit: cover;
    border: 1px solid var(--dorado);
    border-radius: 4px;
    display: block;
  }
  .preview-foto-x {
    position: absolute;
    top: -6px; right: -6px;
    width: 18px; height: 18px;
    background: #ff4444;
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 11px;
    cursor: pointer;
    font-weight: 900;
    padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .preview-foto-x:hover { background: #cc0000; }
</style>
</head>
<body>

  <header>
    <h1>ATARASHI <span>MASTER</span></h1>
    <p>Panel de Control V4.0 — Imágenes en Cloudinary · Datos en GitHub</p>
  </header>

  <div id="statusNube" style="text-align: center; background: #111; padding: 10px; border-radius: 8px; margin: -10px auto 25px; max-width: 1200px; font-size: 13px; border: 1px solid #222;">
    Estado: <span id="statusTexto" style="color: #e67e22; font-weight: bold;">⏳ Esperando configuración...</span>
    <button id="btnConfigToken" style="margin-left: 10px; background: #333; color: #fff; border: 1px solid var(--dorado); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px;" onclick="configurarTokenManualmente()">🔑 GitHub Token</button>
    <button style="margin-left: 6px; background: #333; color: #fff; border: 1px solid #7B68EE; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px;" onclick="configurarCloudinary()">☁️ Cloudinary</button>
    <button id="btnRepararNube" style="display:none; margin-left: 8px; background: #7d2a00; color: #ffcc99; border: 1px solid #e74c3c; padding: 2px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold;" onclick="repararNube()">🔧 Reparar Nube</button>

  <div class="contenedor-master">
    
    <div class="panel-formulario">

            <option value="📁">📁 Carpeta</option>

<script>
  // CONFIGURACIÓN DE ACCESO DE FORMA SEGURA (Moneco615-boop / Atarashi-data)
  const CONFIG_GITHUB = {
    REPOSITORIO: "moneco615-boop/Atarashi-data",
    getToken: function() {
      let t = localStorage.getItem('atarashi_cloud_token');
      if(!t) {
        t = prompt("Introduce tu Token de acceso de GitHub (El que empieza por ghp_ o github_pat_):");
        if(t) {
          localStorage.setItem('atarashi_cloud_token', t.trim());
        }
      }
      return t;
    }
  };

  // ─── CONFIGURACIÓN CLOUDINARY ────────────────────────────────────────────────
  // Las imágenes se suben a Cloudinary (gratis 25GB). Solo se guarda la URL.
  // Resultado: el JSON en GitHub mide <10KB en lugar de varios MB.
  const CONFIG_CLOUDINARY = {
    getCloudName: function() {
      return localStorage.getItem('atarashi_cloudinary_name') || '';
    },
    getPreset: function() {
      return localStorage.getItem('atarashi_cloudinary_preset') || '';
    },
    isReady: function() {
      return !!(this.getCloudName() && this.getPreset());
    }
  };

  function configurarCloudinary() {
    const nombre = prompt(
      "☁️ PASO 1 de 2 — Cloud Name de Cloudinary\n\n" +
      "Ve a cloudinary.com → tu dashboard → copia el nombre que aparece en la esquina superior izquierda.\n\n" +
      "Valor actual: " + (CONFIG_CLOUDINARY.getCloudName() || '(vacío)') + "\n\nEscribe tu Cloud Name:"
    );
    if(!nombre) return;
    localStorage.setItem('atarashi_cloudinary_name', nombre.trim());

    const preset = prompt(
      "☁️ PASO 2 de 2 — Upload Preset\n\n" +
      "En Cloudinary: Settings → Upload → Upload Presets → Crear nuevo → Signing Mode: 'Unsigned'.\n" +
      "Copia el nombre del preset que creaste.\n\n" +
      "Valor actual: " + (CONFIG_CLOUDINARY.getPreset() || '(vacío)') + "\n\nEscribe el nombre del Preset:"
    );
    if(!preset) return;
    localStorage.setItem('atarashi_cloudinary_preset', preset.trim());

    alert("✅ Cloudinary configurado correctamente.\nCloud: " + nombre.trim() + "\nPreset: " + preset.trim());
    actualizarBadgeCloudinary();
  }

  function actualizarBadgeCloudinary() {
    const statusTexto = document.getElementById('statusTexto');
    if(CONFIG_CLOUDINARY.isReady()) {
      // no need to show cloudinary status separately, it shows in product upload
    }
  }

  // Sube una imagen (base64) a Cloudinary y retorna la URL pública
  async function subirACloudinary(base64) {
    const cloudName = CONFIG_CLOUDINARY.getCloudName();
    const preset    = CONFIG_CLOUDINARY.getPreset();

    if(!cloudName || !preset) {
      throw new Error("Falta configurar Cloudinary. Haz clic en el botón ☁️ Cloudinary arriba.");
    }

    const formData = new FormData();
    formData.append('file', base64);
    formData.append('upload_preset', preset);
    formData.append('folder', 'atarashi');

    const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
      method: 'POST',
      body: formData
    });

    if(!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error("Error Cloudinary: " + (errData.error?.message || res.status));
    }

    const data = await res.json();
    return data.secure_url;
  }
  // ─────────────────────────────────────────────────────────────────────────────

  function configurarTokenManualmente() {
    let t = prompt("Introduce tu Token de GitHub (ghp_... o github_pat_...):");
    if(t) {
      localStorage.setItem('atarashi_cloud_token', t.trim());
      cargarDesdeGitHub();
    }
  }

  let productos = JSON.parse(localStorage.getItem('atarashi_productos')) || [];
  let imagenesCargadasActuales = [];
  
  let categoriasValidas = JSON.parse(localStorage.getItem('atarashi_categorias')) || [
    { emoji: "👨", nombre: "Caballero" },
    { emoji: "👩", nombre: "Dama" },
    { emoji: "👟", nombre: "Unisex" }
  ];

  function sincronizarProductosStorage() {
    localStorage.setItem('atarashi_productos', JSON.stringify(productos));
  }

  function sincronizarCategoriasStorage() {
    localStorage.setItem('atarashi_categorias', JSON.stringify(categoriasValidas));
  }

  function renderCategoriasUI() {
    const contenedor = document.getElementById('listaCategoriasContenedor');
    const selectProducto = document.getElementById('pGenero');
    
    if(!contenedor || !selectProducto) return;
    contenedor.innerHTML = '';
    selectProducto.innerHTML = '';

    categoriasValidas.forEach((cat, index) => {
      const tag = document.createElement('span');
      tag.className = 'tag-cat';
      tag.innerHTML = `${cat.emoji} ${cat.nombre} <button class="btn-borrar-cat" onclick="eliminarCategoria(${index})">×</button>`;
      contenedor.appendChild(tag);

      const opcion = document.createElement('option');
      opcion.value = cat.nombre;
      opcion.textContent = `${cat.emoji} ${cat.nombre}`;
      selectProducto.appendChild(opcion);
    });
  }

  function agregarNuevaCategoria() {
    const emojiInput = document.getElementById('newCatEmoji').value;
    const nombreInput = document.getElementById('newCatNombre').value.trim();

    if(!nombreInput) {
      alert("Debes escribir el nombre de la categoría.");
      return;
    }

    const nombreFormateado = nombreInput.charAt(0).toUpperCase() + nombreInput.slice(1);

    if(categoriasValidas.some(c => c.nombre.toUpperCase() === nombreFormateado.toUpperCase())) {
      alert("Esta categoría ya existe.");
      return;
    }

    categoriasValidas.push({ emoji: emojiInput, nombre: nombreFormateado });
    document.getElementById('newCatNombre').value = '';
    
    sincronizarCategoriasStorage();
    renderCategoriasUI();
  }

  function eliminarCategoria(index) {
    const catNombre = categoriasValidas[index].nombre;
    if(confirm(`¿Estás seguro de eliminar la categoría "${catNombre}"? Esto no borrará tus productos, pero se quedarán sin sección.`)) {
      categoriasValidas.splice(index, 1);
      sincronizarCategoriasStorage();
      renderCategoriasUI();
    }
  }

  function renderTabla() {
    const tbody = document.getElementById('tablaCuerpo');
    if(!tbody) return;
    tbody.innerHTML = '';
    document.getElementById('contador').textContent = productos.length;

    productos.forEach((prod, index) => {
      const catAsociada = categoriasValidas.find(c => c.nombre === prod.genero);
      const emojiCat = catAsociada ? catAsociada.emoji : "📁";

      const fila = document.createElement('tr');

  function procesarFotosConCompresion(input) {
    const contenedor = document.getElementById('previewFotosContenedor');
    if (!input.files || input.files.length === 0) return;

    // Verificar Cloudinary antes de empezar
    if(!CONFIG_CLOUDINARY.isReady()) {
      alert("⚠️ Primero debes configurar Cloudinary.\n\nHaz clic en el botón ☁️ Cloudinary en la barra de estado superior.");
      configurarCloudinary();
      return;
    }

    Array.from(input.files).forEach(file => {
      const lector = new FileReader();
      lector.onload = function(e) {
        const imgAux = new Image();
        imgAux.onload = async function() {
          // ─── Comprimir imagen (igual que antes) ───
          const canvas = document.createElement('canvas');
          let ancho = imgAux.width; let alto = imgAux.height;
          const maxDimension = 800;
          if (ancho > maxDimension || alto > maxDimension) {
            if (ancho > alto) { alto = Math.round((alto * maxDimension) / ancho); ancho = maxDimension; }
            else { ancho = Math.round((ancho * maxDimension) / alto); alto = maxDimension; }
          }
          canvas.width = ancho; canvas.height = alto;
          canvas.getContext('2d').drawImage(imgAux, 0, 0, ancho, alto);
          const base64Comprimido = canvas.toDataURL('image/jpeg', 0.7);

          // ─── Mostrar preview local mientras sube ───
          const wrapper = document.createElement('div');
          wrapper.className = 'preview-foto-wrapper';

          const imgPreview = document.createElement('img');
          imgPreview.src = base64Comprimido;
          imgPreview.className = 'preview-mini-foto';
          imgPreview.style.opacity = '0.5';

          // Badge de estado
          const badge = document.createElement('div');
          badge.style.cssText = 'position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.75);color:#F0C040;font-size:10px;text-align:center;padding:2px;border-radius:0 0 4px 4px;';
          badge.textContent = '⏳ Subiendo...';

          wrapper.appendChild(imgPreview);
          wrapper.appendChild(badge);
          contenedor.appendChild(wrapper);

          // ─── Subir a Cloudinary (en lugar de guardar base64) ───
          try {
            const urlPublica = await subirACloudinary(base64Comprimido);
            imagenesCargadasActuales.push(urlPublica);

            // Actualizar preview: confirmar subida
            imgPreview.style.opacity = '1';
            badge.style.background = 'rgba(0,120,0,0.85)';
            badge.style.color = '#7fff7f';
            badge.textContent = '✅ Listo';
            setTimeout(() => badge.remove(), 2500);

            // Botón para eliminar esta imagen de la lista
            const btnX = document.createElement('button');
            btnX.className = 'preview-foto-x';
            btnX.textContent = '×';
            btnX.type = 'button';
            btnX.onclick = function() {
              const idx = imagenesCargadasActuales.indexOf(urlPublica);
              if(idx !== -1) imagenesCargadasActuales.splice(idx, 1);
              wrapper.remove();
            };
            wrapper.appendChild(btnX);

          } catch(err) {
            badge.style.background = 'rgba(180,0,0,0.85)';
            badge.style.color = '#ffaaaa';
            badge.textContent = '❌ Error al subir';
            badge.title = err.message;
            console.error("Error Cloudinary:", err);
            alert("❌ Error al subir imagen a Cloudinary:\n" + err.message);
          }
        };
        imgAux.src = e.target.result;
      };
      lector.readAsDataURL(file);
    });
  }

  // --- SECCIÓN DE FUNCIONES NUBE (CORREGIDAS V3.4) ---

  // ─── UTILIDADES UTF-8 ↔ BASE64 (reemplazan escape/unescape deprecados) ────
  // Convierte texto UTF-8 (con emojis, tildes, ñ, etc.) a Base64 sin errores
  function utf8ToBase64(str) {
    const bytes = new TextEncoder().encode(str);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) {
      binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary);
  }

  // Convierte Base64 (que contiene UTF-8) de vuelta a texto correctamente
  function base64ToUtf8(base64) {
    const binaryStr = atob(base64);
    const bytes = new Uint8Array(binaryStr.length);
    for (let i = 0; i < binaryStr.length; i++) {
      bytes[i] = binaryStr.charCodeAt(i);
    }
    return new TextDecoder('utf-8').decode(bytes);
  }

  async function cargarDesdeGitHub() {
    const token = CONFIG_GITHUB.getToken();
    if(!token) return;

    const statusTexto = document.getElementById('statusTexto');
    const url = `https://api.github.com/repos/${CONFIG_GITHUB.REPOSITORIO}/contents/productos.json`;
    
    try {
      statusTexto.innerHTML = "⏳ Conectando con la nube...";
      statusTexto.style.color = "#e67e22";

      const res = await fetch(url, {
        headers: {
          "Authorization": `Bearer ${token}`,
          "Accept": "application/vnd.github.v3+json"
        }
      });
      
      if (res.status === 401 || res.status === 403) {
        statusTexto.innerHTML = "● Error: Token inválido, vencido o sin permisos de escritura.";
        statusTexto.style.color = "#e74c3c";
        return;
      }

      if (res.ok) {
        const data = await res.json();
        
        let contenidoString = '';

        if (data.content) {
          // Caso normal (archivo <= 1MB): decodificar Base64 con UTF-8 correcto
          const base64Limpio = data.content.replace(/\s/g, '');
          contenidoString = base64ToUtf8(base64Limpio);
        } else if (data.download_url) {
          // Caso archivo grande (> 1MB): GitHub omite 'content' y da una URL directa
          statusTexto.innerHTML = "⏳ Archivo grande, descargando desde nube...";
          const resDescarga = await fetch(data.download_url);
          contenidoString = await resDescarga.text();
        } else {
          throw new Error("El archivo existe pero GitHub no entregó su contenido.");
        }
        
        // Intentar parsear el JSON recibido
        let datosLimpios;
        try {
          datosLimpios = JSON.parse(contenidoString);
        } catch(e) {
          // JSON corrupto: activar modo de recuperación automática
          statusTexto.innerHTML = "⚠️ JSON corrupto en la nube. Usa '🔧 Reparar Nube' para restaurar tus datos locales.";
          statusTexto.style.color = "#e74c3c";
          document.getElementById('btnRepararNube').style.display = 'inline-block';
          console.error("JSON inválido recibido:", contenidoString.substring(0, 200));
          return; // Salir sin limpiar los datos locales
        }
        
        if (datosLimpios.productos) productos = datosLimpios.productos;
        if (datosLimpios.categorias || datosLimpios.categories) {
          categoriasValidas = datosLimpios.categorias || datosLimpios.categories;
        }
        
        sincronizarProductosStorage();
        sincronizarCategoriasStorage();
        renderCategoriasUI();
        renderTabla();
        
        statusTexto.innerHTML = `● CONECTADO — ${productos.length} producto(s) sincronizados`;
        statusTexto.style.color = "#2ecc71";
        document.getElementById('btnRepararNube').style.display = 'none';

      } else if (res.status === 404) {
        statusTexto.innerHTML = "● Modo Local activo (productos.json no existe aún en la nube — usa 'Publicar' para crearlo)";
        statusTexto.style.color = "#f1c40f";
      } else {
        statusTexto.innerHTML = `● Error de servidor GitHub (HTTP ${res.status})`;
        statusTexto.style.color = "#e74c3c";
      }
    } catch (error) {
      console.error("Error cargarDesdeGitHub:", error);
      statusTexto.innerHTML = "● Error de red: " + error.message;
      statusTexto.style.color = "#e74c3c";
    }
  }

  // Repara el archivo en la nube sobreescribiéndolo con los datos del localStorage
  async function repararNube() {
    if (!confirm("Esto sobreescribirá el archivo corrupto en GitHub con tus datos locales actuales (" + productos.length + " productos). ¿Continuar?")) return;
    
    const btnReparar = document.getElementById('btnRepararNube');
    btnReparar.disabled = true;
    btnReparar.innerHTML = "⏳ Reparando...";
    
    try {
      const datosNube = { productos: productos, categorias: categoriasValidas };
      await guardarArchivoEnGitHub("productos.json", JSON.stringify(datosNube, null, 2), "🔧 Reparación de emergencia de JSON");
      alert("¡Archivo reparado con éxito! La nube ya tiene los " + productos.length + " productos de tu memoria local.");
      cargarDesdeGitHub();
    } catch(err) {
      alert("Error al reparar: " + err.message);
      btnReparar.disabled = false;
      btnReparar.innerHTML = "🔧 Reparar Nube";
    }
  }

  async function guardarArchivoEnGitHub(ruta, contenidoTexto, mensajeCommit) {
    const token = CONFIG_GITHUB.getToken();
    if(!token) throw new Error("Falta el Token de GitHub");

    const url = `https://api.github.com/repos/${CONFIG_GITHUB.REPOSITORIO}/contents/${ruta}`;
    let sha = null;
    
    try {
      const resSha = await fetch(url, {
        headers: { "Authorization": `Bearer ${token}` }
      });
      if (resSha.ok) {
        const dataSha = await resSha.json();
        sha = dataSha.sha;
      }
    } catch (e) {}
    
    const bodyData = {
      message: mensajeCommit,
      content: utf8ToBase64(contenidoTexto)  // Codificación UTF-8 correcta (soporta emojis y tildes)
    };
    if (sha) bodyData.sha = sha;
    
    const resPut = await fetch(url, {
      method: "PUT",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify(bodyData)
    });
    
    if (!resPut.ok) {
      const errData = await resPut.json();
      throw new Error(errData.message || "Error al subir el archivo a la nube");
    }
  }

  async function publicarEnGitHub() {
    const btn = document.getElementById('btnCloudSync');
    const originalText = btn.innerHTML;
    btn.innerHTML = "⏳ Sincronizando datos en la nube...";
    btn.disabled = true;
    
    try {
      const datosNube = {
        productos: productos,
        categorias: categoriasValidas
      };
      await guardarArchivoEnGitHub("productos.json", JSON.stringify(datosNube, null, 2), "Actualización de base de datos desde el Panel Master");
      
      // Nota: ya NO se regenera index.html en cada publicación.
      // El catálogo público ahora carga productos.json en vivo (con
      // anti-caché) cada vez que alguien abre el link, así que basta con
      // actualizar este archivo de datos. Esto también evita que una
      // plantilla rota pueda dañar el catálogo público otra vez.
      
      alert("¡Éxito absoluto, Luis! Los cambios se han enviado a la nube. Tu catálogo web se actualizará en segundos, sin que nadie necesite refrescar nada.");
      cargarDesdeGitHub();
    } catch (error) {
      console.error(error);
      alert("Hubo un error al intentar publicar: " + error.message + ". Verifica si tu token sigue activo.");
    } finally {
      btn.innerHTML = originalText;
      btn.disabled = false;
    }
  }

  renderCategoriasUI();
  renderTabla();
  
  // Cargar automáticamente si ya existe token en la memoria local
  if(localStorage.getItem('atarashi_cloud_token')) {
    cargarDesdeGitHub();
  }

<script>
  const productos = ${JSON.stringify(productos)};
  const confCategorias = ${JSON.stringify(categoriasValidas)};
  
  let filtroGenActivo = 'todos';
  let productoSeleccionado = null;
  let indiceFotoActual = 0;

  function cerrarPortada() {
    const portada = document.getElementById('portadaCredits');
    if (portada) {
      portada.classList.add('oculta');
      setTimeout(() => {
        portada.style.display = 'none';
      }, 600);
    }
  }

  function generarBotonesFiltro() {
    const contenedorFiltros = document.getElementById('filtrosGenero');
    if(!contenedorFiltros) return;
    
    contenedorFiltros.innerHTML = '<button class="btn-filtro activo" onclick="filtrar(\\'todos\\', this)">Todos los productos</button>';
    
    confCategorias.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'btn-filtro';
      btn.innerHTML = cat.emoji + ' ' + cat.nombre;
      btn.onclick = function() { filtrar(cat.nombre, btn); };
      contenedorFiltros.appendChild(btn);
    });
  }

  // ── NÚMERO WHATSAPP ATARASHI (cambia solo este número) ──
  const WA_NUMERO = "573000000000"; // ← Reemplaza con tu número real (código país + número, sin + ni espacios)

  // ── ESTADO DEL MODAL ──
  let modoActivo = 'quincenal'; // 'quincenal' | 'semanal'

  function formatoMoneda(v) { return '$' + Math.round(v).toLocaleString('es-CO'); }

  // ── CAMBIO DE MODO QUINCENAL / SEMANAL ──
  function cambiarModo(modo) {
    modoActivo = modo;
    document.getElementById('btnModoQuincenal').classList.toggle('activo', modo === 'quincenal');
    document.getElementById('btnModoSemanal').classList.toggle('activo', modo === 'semanal');
    document.getElementById('labelTipoCuota').textContent = modo === 'quincenal' ? 'Tu cuota quincenal:' : 'Tu cuota semanal:';
    poblarOpcionesCuotas();
    actualizarPreciosModal();
  }

  // ── POBLAR EL SELECT SEGÚN EL MODO ACTIVO ──
  function poblarOpcionesCuotas() {
    const select = document.getElementById('modalSelectCuotas');
    select.innerHTML = '';
    if (!productoSeleccionado) return;
    const p = productoSeleccionado.precios;

    if (modoActivo === 'quincenal') {
      if (p[2] > 0) select.innerHTML += '<option value="Q2">2 Quincenas (~1 mes)</option>';
      if (p[4] > 0) select.innerHTML += '<option value="Q4">4 Quincenas (~2 meses)</option>';
      if (p[6] > 0) select.innerHTML += '<option value="Q6">6 Quincenas (~3 meses)</option>';
      if (!select.innerHTML) select.innerHTML = '<option value="Q2">2 Quincenas</option>';
    } else {
      // Semanas: se derivan de los precios quincenales registrados
      // 2 sem ≈ 1Q, 4 sem ≈ 2Q, 6 sem entre 2Q y 4Q, 8 sem ≈ 4Q
      if (p[2] > 0) select.innerHTML += '<option value="S2">2 Semanas</option>';
      if (p[2] > 0) select.innerHTML += '<option value="S4">4 Semanas (~1 mes)</option>';
      if (p[4] > 0) select.innerHTML += '<option value="S6">6 Semanas</option>';
      if (p[4] > 0) select.innerHTML += '<option value="S8">8 Semanas (~2 meses)</option>';
      if (!select.innerHTML) select.innerHTML = '<option value="S4">4 Semanas</option>';
    }
  }

  // ── CALCULAR Y MOSTRAR PRECIO SEGÚN SELECCIÓN ──
  function actualizarPreciosModal() {
    if (!productoSeleccionado) return;
    const val = document.getElementById('modalSelectCuotas').value;
    const p = productoSeleccionado.precios;
    let total = 0, divisor = 1;

    if (modoActivo === 'quincenal') {
      const n = parseInt(val.replace('Q',''));
      total = p[n] || p[2] || p[4] || p[6];
      divisor = n;
    } else {
      // Tabla de equivalencia semanas → precio base quincenal
      const tablaRef = { S2: [p[2], 2], S4: [p[2], 4], S6: [p[4]||p[2], 6], S8: [p[4]||p[2], 8] };
      const ref = tablaRef[val] || [p[2], 4];
      total   = ref[0];
      divisor = ref[1];
    }

    const cuota = total / divisor;
    document.getElementById('modalValorCuota').textContent = formatoMoneda(cuota);
    document.getElementById('modalTotalCredito').textContent = 'Total a crédito: ' + formatoMoneda(total);
  }

  // ── ABRIR MODAL DE PRODUCTO ──
  function abrirModal(id) {
    productoSeleccionado = productos.find(p => p.id === id);
    if (!productoSeleccionado) return;

    indiceFotoActual = 0;
    modoActivo = 'quincenal';
    document.getElementById('modalTitulo').textContent = productoSeleccionado.nombre;
    document.getElementById('modalImg').src = productoSeleccionado.imagenes[0] || 'https://via.placeholder.com/260';
    document.getElementById('btnModoQuincenal').classList.add('activo');
    document.getElementById('btnModoSemanal').classList.remove('activo');
    document.getElementById('labelTipoCuota').textContent = 'Tu cuota quincenal:';

    poblarOpcionesCuotas();
    actualizarPreciosModal();
    document.getElementById('modalDetalles').classList.add('show');
  }

  // ── ABRIR FORMULARIO DE SOLICITUD ──
  function abrirFormularioSolicitud() {
    if (!productoSeleccionado) return;
    const cuotaTxt   = document.getElementById('modalValorCuota').textContent;
    const totalTxt   = document.getElementById('modalTotalCredito').textContent;
    const selVal     = document.getElementById('modalSelectCuotas').value;
    const selLabel   = document.getElementById('modalSelectCuotas').selectedOptions[0]?.text || '';

    document.getElementById('formProdNombre').textContent = productoSeleccionado.nombre;
    document.getElementById('formProdCuota').textContent  = selLabel + ' — ' + cuotaTxt + '/cuota · ' + totalTxt;

    // Guardar selección para el mensaje WhatsApp
    document.getElementById('modalFormulario').dataset.selLabel = selLabel;
    document.getElementById('modalFormulario').dataset.cuotaTxt = cuotaTxt;
    document.getElementById('modalFormulario').dataset.totalTxt = totalTxt;

    document.getElementById('modalDetalles').classList.remove('show');
    document.getElementById('modalFormulario').classList.add('show');
  }

  // ── ENVIAR SOLICITUD POR WHATSAPP ──
  function enviarSolicitudWhatsApp() {
    const nombre   = document.getElementById('solNombre').value.trim();
    const whatsapp = document.getElementById('solWhatsapp').value.trim();
    const barrio   = document.getElementById('solBarrio').value.trim();
    const conocio  = document.getElementById('solConocio').value;

    if (!nombre || !whatsapp) {
      alert('Por favor completa tu Nombre y tu número de WhatsApp.');
      return;
    }

    const fm   = document.getElementById('modalFormulario');
    const prod = productoSeleccionado ? productoSeleccionado.nombre : '—';
    const plan = fm.dataset.selLabel  || '—';
    const cuota= fm.dataset.cuotaTxt  || '—';
    const total= fm.dataset.totalTxt  || '—';

    const msg =
      '🛍️ *SOLICITUD DE CRÉDITO — ATARASHI CREDITS*\\n\\n' +
      '👤 *Nombre:* ' + nombre + '\\n' +
      '📱 *WhatsApp:* ' + whatsapp + '\\n' +
      '📍 *Barrio / Ciudad:* ' + (barrio || 'No indicado') + '\\n' +
      '🔎 *Nos conoció por:* ' + conocio + '\\n\\n' +
      '🛒 *Producto:* ' + prod + '\\n' +
      '🗓️ *Plan elegido:* ' + plan + '\\n' +
      '💵 *Cuota:* ' + cuota + '\\n' +
      '💰 ' + total + '\\n\\n' +
      '_Enviado desde el Catálogo Digital Atarashi Credits_';

    const url = 'https://wa.me/' + WA_NUMERO + '?text=' + encodeURIComponent(msg.replace(/\\\\n/g,'\\n'));
    window.open(url, '_blank');
    cerrarFormulario();
  }

  function cerrarFormulario() {
    document.getElementById('modalFormulario').classList.remove('show');
    document.getElementById('solNombre').value    = '';
    document.getElementById('solWhatsapp').value  = '';
    document.getElementById('solBarrio').value    = '';
  }
  function cerrarFormularioExterno(e) { if (e.target.id === 'modalFormulario') cerrarFormulario(); }

  function cambiarFotoModal(dir) {
    if (!productoSeleccionado) return;
    const fotos = productoSeleccionado.imagenes;
    if(!fotos || fotos.length <= 1) return;
    indiceFotoActual += dir;
    if (indiceFotoActual < 0) indiceFotoActual = fotos.length - 1;
    if (indiceFotoActual >= fotos.length) indiceFotoActual = 0;
    document.getElementById('modalImg').src = fotos[indiceFotoActual];
  }

  function cerrarModal() { document.getElementById('modalDetalles').classList.remove('show'); productoSeleccionado = null; }
  function cerrarModalExterno(e) { if (e.target.id === 'modalDetalles') cerrarModal(); }

  function filtrar(val, btn) {
    document.querySelectorAll('#filtrosGenero .btn-filtro').forEach(b => b.classList.remove('activo')); 
    filtroGenActivo = val;
    btn.classList.add('activo'); 
    renderizarProductos();
  }

  function renderizarProductos() {
    const grid = document.getElementById('gridProductos'); if(!grid) return;
    grid.innerHTML = '';

    productos.forEach(prod => {
      if (filtroGenActivo !== 'todos' && prod.genero !== filtroGenActivo) return;

      const badgeHTML = prod.badge ? '<span class="badge-tag">' + prod.badge + '</span>' : '';
      const tarjeta = document.createElement('div');
      tarjeta.className = 'tarjeta-prod';
      tarjeta.onclick = () => abrirModal(prod.id);
      tarjeta.innerHTML = badgeHTML + '<div class="img-contenedor"><img src="' + (prod.imagenes[0] || 'https://via.placeholder.com/260') + '"></div><div class="info-contenedor"><h3 class="prod-nombre">' + prod.nombre + '</h3><p class="txt-quincenas-gancho">Hasta ' + prod.plazoMax + ' quincenas</p><p class="txt-clic-mas">Ver detalles ➔</p></div>';

      grid.appendChild(tarjeta);
    });
  }

  generarBotonesFiltro();
  renderizarProductos();
<\/script>
