<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atarashi MASTER — Panel de Control V3.3 (Con Memoria Permanente)</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght=400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --negro-fondo: #0a0a0a;
    --negro-tarjeta: #121212;
    --negro-panel: #181818;
    --dorado: #C9A02A;
    --dorado-brillante: #F0C040;
    --blanco: #F5F2EA;
    --gris: #888880;
    --fuente-titulo: 'Bebas Neue', sans-serif;
    --fuente-cuerpo: 'Outfit', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--negro-fondo);
    font-family: var(--fuente-cuerpo);
    color: var(--blanco);
    padding: 20px 12px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 25px;
    padding-bottom: 15px;
    border-bottom: 1px solid rgba(201,160,42,0.1);
  }
  header h1 {
    font-family: var(--fuente-titulo);
    font-size: 42px;
    letter-spacing: 4px;
    color: var(--blanco);
  }
  header h1 span { color: var(--dorado); }
  header p { font-size: 14px; color: var(--gris); margin-top: 5px; }

  .contenedor-master {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr;
    gap: 30px;
  }
  @media(min-width: 900px) {
    .contenedor-master { grid-template-columns: 400px 1fr; }
  }

  .panel-formulario {
    background: var(--negro-panel);
    border: 1px solid var(--dorado);
    border-radius: 12px;
    padding: 20px;
    height: fit-content;
    position: sticky;
    top: 20px;
  }
  .panel-formulario h2 {
    font-family: var(--fuente-titulo);
    font-size: 26px;
    letter-spacing: 1px;
    margin-bottom: 15px;
    color: var(--dorado);
  }
  
  .caja-admin-categorias {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(201,160,42,0.2);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 20px;
  }
  .caja-admin-categorias h3 {
    font-size: 13px;
    text-transform: uppercase;
    color: var(--dorado);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }
  .lista-tags-categorias {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .tag-cat {
    background: #0d0d0d;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-borrar-cat {
    background: none;
    border: none;
    color: #ff4d4d;
    cursor: pointer;
    font-weight: bold;
    font-size: 12px;
  }
  .form-nueva-cat {
    display: flex;
    gap: 4px;
  }

  .grupo-campo { margin-bottom: 12px; }
  .grupo-campo label {
    display: block;
    font-size: 12px;
    color: var(--gris);
    margin-bottom: 5px;
    text-transform: uppercase;
  }
  .grupo-campo input, .grupo-campo select, .grupo-campo textarea {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid rgba(201,160,42,0.3);
    color: #fff;
    padding: 8px 10px;
    border-radius: 6px;
    font-family: var(--fuente-cuerpo);
    font-size: 13px;
    outline: none;
  }
  .grupo-campo input:focus, .grupo-campo select:focus {
    border-color: var(--dorado-brillante);
  }
  
  .caja-paso-uno {
    background: rgba(201,160,42,0.05);
    border: 1px dashed rgba(201,160,42,0.3);
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 15px;
  }

  .fila-precios {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    background: rgba(0,0,0,0.2);
    padding: 10px;
    border-radius: 6px;
    margin-top: 5px;
  }

  .btn-primario {
    width: 100%;
    background: var(--dorado);
    color: #000;
    border: none;
    padding: 12px;
    border-radius: 6px;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    text-transform: uppercase;
    margin-top: 10px;
    transition: background 0.2s;
  }
  .btn-primario:hover { background: var(--dorado-brillante); }

  .btn-descargar {
    width: 100%;
    background: #155724;
    color: #d4edda;
    border: 1px solid #c3e6cb;
    padding: 12px;
    border-radius: 6px;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    text-transform: uppercase;
    margin-top: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-descargar:hover { background: #1e7e34; }

  .panel-lista h2 {
    font-family: var(--fuente-titulo);
    font-size: 28px;
    letter-spacing: 2px;
    margin-bottom: 20px;
    border-bottom: 1px solid rgba(201,160,42,0.1);
    padding-bottom: 5px;
  }
  .tabla-productos {
    width: 100%;
    border-collapse: collapse;
    background: var(--negro-tarjeta);
    border-radius: 8px;
    overflow: hidden;
  }
  .tabla-productos th, .tabla-productos td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
  }
  .tabla-productos th {
    background: rgba(201,160,42,0.1);
    color: var(--dorado);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 1px;
  }
  .mini-img {
    width: 45px;
    height: 45px;
    object-fit: contain;
    background: #1a1a1a;
    border-radius: 4px;
    border: 1px solid rgba(201,160,42,0.2);
  }
  .btn-tabla {
    color: #fff;
    border: none;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 11px;
    margin-right: 4px;
  }
  .btn-editar { background: #0056b3; }
  .btn-editar:hover { background: #004085; }
  .btn-eliminar { background: #721c24; }
  .btn-eliminar:hover { background: #bd2130; }

  .preview-fotos-caja { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .preview-foto-wrapper {
    position: relative;
    width: 60px; height: 60px;
    flex-shrink: 0;
  }
  .preview-mini-foto {
    width: 100%; height: 100%;
    object-fit: cover;
    border: 1px solid var(--dorado);
    border-radius: 4px;
    display: block;
  }
  .preview-foto-x {
    position: absolute;
    top: -6px; right: -6px;
    width: 18px; height: 18px;
    background: #ff4444;
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 11px;
    cursor: pointer;
    font-weight: 900;
    padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .preview-foto-x:hover { background: #cc0000; }
</style>
</head>
<body>

  <header>
    <h1>ATARASHI <span>MASTER</span></h1>
    <p>Panel de Control Oficial V3.3 — Sincronización Protegida en la Nube</p>
  </header>

  <div id="statusNube" style="text-align: center; background: #111; padding: 10px; border-radius: 8px; margin: -10px auto 25px; max-width: 1200px; font-size: 13px; border: 1px solid #222;">
    Estado del Sistema: <span id="statusTexto" style="color: #e67e22; font-weight: bold;">⏳ Esperando configuración de seguridad...</span>
    <button id="btnConfigToken" style="margin-left: 10px; background: #333; color: #fff; border: 1px solid var(--dorado); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px;" onclick="configurarTokenManualmente()">Cambiar Token</button>
  </div>

  <div class="contenedor-master">
    
    <div class="panel-formulario">
      
      <div class="caja-admin-categorias">
        <h3>📁 Administrar Categorías del Catálogo</h3>
        <div class="lista-tags-categorias" id="listaCategoriasContenedor"></div>
        <div class="form-nueva-cat">
          <select id="newCatEmoji" style="width: 30%; background: #0d0d0d; border: 1px solid rgba(201,160,42,0.3); color:#fff; border-radius:6px; padding:4px;">
            <option value="📁">📁 Carpeta</option>
            <option value="👨">👨 Hombre</option>
            <option value="👩">👩 Mujer</option>
            <option value="👟">👟 Tenis</option>
            <option value="👠">👠 Tacones</option>
            <option value="👞">👞 Zapato</option>
            <option value="🧸">🧸 Juguete</option>
            <option value="👧">👧 Niños</option>
            <option value="👦">👦 Niño</option>
            <option value="👶">👶 Bebé</option>
            <option value="📉">📉 Promo</option>
            <option value="🔥">🔥 Fuego</option>
            <option value="💥">💥 Nuevo</option>
            <option value="⭐">⭐ Destacado</option>
            <option value="🎒">🎒 Maletín</option>
            <option value="👜">👜 Bolso</option>
            <option value="🎽">🎽 Ropa</option>
            <option value="👕">👕 Camiseta</option>
            <option value="👗">👗 Vestido</option>
            <option value="🧥">🧥 Chaqueta</option>
            <option value="⌚">⌚ Reloj</option>
            <option value="📱">📱 Celular</option>
            <option value="💻">💻 Tecnología</option>
            <option value="🎧">🎧 Audio</option>
            <option value="🧢">🧢 Gorra</option>
            <option value="💍">💍 Joyería</option>
            <option value="🕶️">🕶️ Gafas</option>
            <option value="🏠">🏠 Hogar</option>
            <option value="🛋️">🛋️ Muebles</option>
            <option value="🍳">🍳 Cocina</option>
            <option value="⚡">⚡ Rayo</option>
            <option value="💄">💄 Belleza</option>
            <option value="🌸">🌸 Cuidado</option>
            <option value="🏋️">🏋️ Deporte</option>
            <option value="⚽">⚽ Fútbol</option>
            <option value="🎮">🎮 Gaming</option>
            <option value="🎁">🎁 Regalo</option>
            <option value="💰">💰 Oferta</option>
            <option value="🆕">🆕 Nuevo</option>
            <option value="🛒">🛒 General</option>
            <option value="🌟">🌟 Premium</option>
            <option value="💎">💎 Exclusivo</option>
            <option value="🐾">🐾 Mascotas</option>
            <option value="📚">📚 Librería</option>
            <option value="🖥️">🖥️ Electrónica</option>
          </select>
          <input type="text" id="newCatNombre" placeholder="Nombre (Ej: Juguetería)" style="width: 50%;">
          <button type="button" class="btn-primario" style="margin:0; padding:8px; font-size:11px; width:20%;" onclick="agregarNuevaCategoria()">+ OK</button>
        </div>
      </div>

      <h2 id="tituloFormulario">Añadir Producto</h2>
      <form id="formProducto" onsubmit="guardarFormulario(event)">
        <input type="hidden" id="pIdModo" value="">

        <div class="caja-paso-uno">
          <div class="grupo-campo" style="margin-bottom: 0;">
            <label style="color: var(--dorado-brillante); font-weight: 800;">1. Seleccionar Fotos desde PC / Celular</label>
            <input type="file" id="pArchivosFotos" multiple accept="image/*" onchange="procesarFotosConCompresion(this)">
            <div class="preview-fotos-caja" id="previewFotosContenedor"></div>
          </div>
        </div>

        <div class="grupo-campo">
          <label>Nombre del Producto</label>
          <input type="text" id="pNombre" required placeholder="Ej. NIKE DUNK LOW">
        </div>

        <div class="grupo-campo">
          <label>Categoría asignada</label>
          <select id="pGenero"></select>
        </div>

        <div class="grupo-campo">
          <label>Etiqueta Comercial (Gancho de venta)</label>
          <select id="pBadgeSelect">
            <option value="">🚫 Ninguna etiqueta</option>
            <option value="🔥 TOP VENTAS">🔥 TOP VENTAS</option>
            <option value="⭐ RECOMENDADO">⭐ RECOMENDADO</option>
            <option value="📉 PROMOCIÓN">📉 PROMOCIÓN</option>
            <option value="💰 OFERTA">💰 OFERTA</option>
            <option value="📦 LIQUIDACIÓN">📦 LIQUIDACIÓN</option>
            <option value="✨ TEMPORADA">✨ TEMPORADA</option>
          </select>
        </div>

        <div class="grupo-campo">
          <label>Plazo Máximo Recomendado</label>
          <select id="pPlazoMax">
            <option value="2">Hasta 2 Quincenas</option>
            <option value="4">Hasta 4 Quincenas</option>
            <option value="6">Hasta 6 Quincenas</option>
          </select>
        </div>

        <div class="grupo-campo">
          <label>Precios según número de Cuotas</label>
          <div class="fila-precios">
            <div>
              <label style="font-size:9px;">A 2 Cuotas</label>
              <input type="number" id="pPrecio2" required placeholder="Ej. 120000">
            </div>
            <div>
              <label style="font-size:9px;">A 4 Cuotas</label>
              <input type="number" id="pPrecio4" placeholder="Ej. 140000">
            </div>
            <div>
              <label style="font-size:9px;">A 6 Cuotas</label>
              <input type="number" id="pPrecio6" placeholder="Ej. 160000">
            </div>
          </div>
        </div>

        <button type="submit" class="btn-primario" id="btnGuardarForm">Guardar Producto</button>
        <button type="button" class="btn-eliminar" id="btnCancelarEdit" style="display:none; width:100%; margin-top:8px; padding:10px;" onclick="cancelarEdicion()">Cancelar Edición</button>
      </form>

      <button class="btn-primario" id="btnCloudSync" style="background: #27ae60; color: white; margin-top: 15px; font-size: 13px;" onclick="publicarEnGitHub()">
        ⚡ PUBLICAR CAMBIOS EN LA WEB (NUBE)
      </button>

      <button class="btn-descargar" onclick="descargarCatalogoCliente()">
        📦 GENERAR Y DESCARGAR CATÁLOGO LOCAL
      </button>
    </div>

    <div class="panel-lista">
      <h2>Productos en el Catálogo (<span id="contador">0</span>)</h2>
      <div style="overflow-x: auto;">
        <table class="tabla-productos">
          <thead>
            <tr>
              <th>Foto</th>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Plazo Max</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaCuerpo"></tbody>
        </table>
      </div>
    </div>

  </div>

<script>
  // CONFIGURACIÓN DE ACCESO DE FORMA SEGURA (Moneco615-boop / Atarashi-data)
  const CONFIG_GITHUB = {
    REPOSITORIO: "moneco615-boop/Atarashi-data",
    getToken: function() {
      let t = localStorage.getItem('atarashi_cloud_token');
      if(!t) {
        t = prompt("Luis, por favor introduce tu Token de acceso de GitHub (El que empieza por ghp_):");
        if(t) {
          localStorage.setItem('atarashi_cloud_token', t.trim());
        }
      }
      return t;
    }
  };

  function configurarTokenManualmente() {
    let t = prompt("Introduce tu Token de GitHub (ghp_...):");
    if(t) {
      localStorage.setItem('atarashi_cloud_token', t.trim());
      cargarDesdeGitHub();
    }
  }

  let productos = JSON.parse(localStorage.getItem('atarashi_productos')) || [];
  let imagenesCargadasActuales = [];
  
  let categoriasValidas = JSON.parse(localStorage.getItem('atarashi_categorias')) || [
    { emoji: "👨", nombre: "Caballero" },
    { emoji: "👩", nombre: "Dama" },
    { emoji: "👟", nombre: "Unisex" }
  ];

  function sincronizarProductosStorage() {
    localStorage.setItem('atarashi_productos', JSON.stringify(productos));
  }

  function sincronizarCategoriasStorage() {
    localStorage.setItem('atarashi_categorias', JSON.stringify(categoriasValidas));
  }

  function renderCategoriasUI() {
    const contenedor = document.getElementById('listaCategoriasContenedor');
    const selectProducto = document.getElementById('pGenero');
    
    if(!contenedor || !selectProducto) return;
    contenedor.innerHTML = '';
    selectProducto.innerHTML = '';

    categoriasValidas.forEach((cat, index) => {
      const tag = document.createElement('span');
      tag.className = 'tag-cat';
      tag.innerHTML = `${cat.emoji} ${cat.nombre} <button class="btn-borrar-cat" onclick="eliminarCategoria(${index})">×</button>`;
      contenedor.appendChild(tag);

      const opcion = document.createElement('option');
      opcion.value = cat.nombre;
      opcion.textContent = `${cat.emoji} ${cat.nombre}`;
      selectProducto.appendChild(opcion);
    });
  }

  function agregarNuevaCategoria() {
    const emojiInput = document.getElementById('newCatEmoji').value;
    const nombreInput = document.getElementById('newCatNombre').value.trim();

    if(!nombreInput) {
      alert("Debes escribir el nombre de la categoría.");
      return;
    }

    const nombreFormateado = nombreInput.charAt(0).toUpperCase() + nombreInput.slice(1);

    if(categoriasValidas.some(c => c.nombre.toUpperCase() === nombreFormateado.toUpperCase())) {
      alert("Esta categoría ya existe.");
      return;
    }

    categoriasValidas.push({ emoji: emojiInput, nombre: nombreFormateado });
    document.getElementById('newCatNombre').value = '';
    
    sincronizarCategoriasStorage();
    renderCategoriasUI();
  }

  function eliminarCategoria(index) {
    const catNombre = categoriasValidas[index].nombre;
    if(confirm(`¿Estás seguro de eliminar la categoría "${catNombre}"? Esto no borrará tus productos, pero se quedarán sin sección.`)) {
      categoriasValidas.splice(index, 1);
      sincronizarCategoriasStorage();
      renderCategoriasUI();
    }
  }

  function renderTabla() {
    const tbody = document.getElementById('tablaCuerpo');
    if(!tbody) return;
    tbody.innerHTML = '';
    document.getElementById('contador').textContent = productos.length;

    productos.forEach((prod, index) => {
      const catAsociada = categoriasValidas.find(c => c.nombre === prod.genero);
      const emojiCat = catAsociada ? catAsociada.emoji : "📁";

      const fila = document.createElement('tr');
      fila.innerHTML = `
        <td><img src="${prod.imagenes[0] || 'https://via.placeholder.com/50'}" class="mini-img"></td>
        <td style="font-weight:bold; text-transform:uppercase;">${prod.nombre}</td>
        <td>${emojiCat} ${prod.genero}</td>
        <td>Hasta ${prod.plazoMax} Quincenas</td>
        <td>
          <button class="btn-tabla btn-editar" onclick="cargarProductoParaEditar(${prod.id})">Editar</button>
          <button class="btn-tabla btn-eliminar" onclick="eliminarProducto(${index})">Borrar</button>
        </td>
      `;
      tbody.appendChild(fila);
    });
  }

  function procesarFotosConCompresion(input) {
    const contenedor = document.getElementById('previewFotosContenedor');
    if (!input.files || input.files.length === 0) return;

    Array.from(input.files).forEach(file => {
      const lector = new FileReader();
      lector.onload = function(e) {
        const imgAux = new Image();
        imgAux.onload = function() {
          const canvas = document.createElement('canvas');
          let ancho = imgAux.width; let alto = imgAux.height;
          const maxDimension = 800;

          if (ancho > maxDimension || alto > maxDimension) {
            if (ancho > alto) { alto = Math.round((alto * maxDimension) / ancho); ancho = maxDimension; }
            else { ancho = Math.round((ancho * maxDimension) / alto); alto = maxDimension; }
          }
          canvas.width = ancho; canvas.height = alto;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(imgAux, 0, 0, ancho, alto);

          const base64Comprimido = canvas.toDataURL('image/jpeg', 0.7);
          const indice = imagenesCargadasActuales.length;
          imagenesCargadasActuales.push(base64Comprimido);

          const wrapper = document.createElement('div');
          wrapper.className = 'preview-foto-wrapper';
          wrapper.dataset.indice = indice;

          const imgPreview = document.createElement('img');
          imgPreview.src = base64Comprimido;
          imgPreview.className = 'preview-mini-foto';

          const btnX = document.createElement('button');
          btnX.className = 'preview-foto-x';
          btnX.textContent = '×';
          btnX.type = 'button';
          btnX.onclick = function() { eliminarFotoPreview(wrapper, base64Comprimido); };

          wrapper.appendChild(imgPreview);
          wrapper.appendChild(btnX);
          contenedor.appendChild(wrapper);
        };
        imgAux.src = e.target.result;
      };
      lector.readAsDataURL(file);
    });
  }

  function eliminarFotoPreview(wrapper, base64) {
    const idx = imagenesCargadasActuales.indexOf(base64);
    if (idx !== -1) imagenesCargadasActuales.splice(idx, 1);
    wrapper.remove();
  }

  function guardarFormulario(e) {
    e.preventDefault();
    const idModo = document.getElementById('pIdModo').value;

    if(imagenesCargadasActuales.length === 0) {
      alert("Por favor selecciona fotos al inicio del formulario.");
      return;
    }

    const selectBadge = document.getElementById('pBadgeSelect').value;

    const datosProducto = {
      nombre: document.getElementById('pNombre').value.toUpperCase(),
      genero: document.getElementById('pGenero').value,
      badge: selectBadge,
      plazoMax: document.getElementById('pPlazoMax').value,
      precios: {
        2: parseFloat(document.getElementById('pPrecio2').value || 0),
        4: parseFloat(document.getElementById('pPrecio4').value || 0),
        6: parseFloat(document.getElementById('pPrecio6').value || 0)
      },
      imagenes: [...imagenesCargadasActuales]
    };

    if (idModo) {
      const indice = productos.findIndex(p => p.id == idModo);
      if(indice !== -1) { datosProducto.id = parseInt(idModo); productos[indice] = datosProducto; }
      cancelarEdicion();
    } else {
      datosProducto.id = Date.now();
      productos.push(datosProducto);
    }

    sincronizarProductosStorage();

    document.getElementById('formProducto').reset();
    document.getElementById('previewFotosContenedor').innerHTML = '';
    imagenesCargadasActuales = [];
    renderTabla();
  }

  function cargarProductoParaEditar(id) {
    const prod = productos.find(p => p.id === id);
    if(!prod) return;

    document.getElementById('tituloFormulario').textContent = "✏️ Editar Producto";
    document.getElementById('btnGuardarForm').textContent = "Actualizar Cambios";
    document.getElementById('btnCancelarEdit').style.display = "block";
    
    document.getElementById('pIdModo').value = prod.id;
    document.getElementById('pNombre').value = prod.nombre;
    document.getElementById('pGenero').value = prod.genero;
    document.getElementById('pBadgeSelect').value = prod.badge || '';

    document.getElementById('pPlazoMax').value = prod.plazoMax;
    document.getElementById('pPrecio2').value = prod.precios[2] || '';
    document.getElementById('pPrecio4').value = prod.precios[4] || '';
    document.getElementById('pPrecio6').value = prod.precios[6] || '';

    imagenesCargadasActuales = [...prod.imagenes];
    const contenedor = document.getElementById('previewFotosContenedor');
    contenedor.innerHTML = '';
    imagenesCargadasActuales.forEach(src => {
      const wrapper = document.createElement('div');
      wrapper.className = 'preview-foto-wrapper';

      const img = document.createElement('img');
      img.src = src; img.className = 'preview-mini-foto';

      const btnX = document.createElement('button');
      btnX.className = 'preview-foto-x';
      btnX.textContent = '×';
      btnX.type = 'button';
      btnX.onclick = function() { eliminarFotoPreview(wrapper, src); };

      wrapper.appendChild(img);
      wrapper.appendChild(btnX);
      contenedor.appendChild(wrapper);
    });
    document.querySelector('.panel-formulario').scrollIntoView({ behavior: 'smooth' });
  }

  function cancelarEdicion() {
    document.getElementById('tituloFormulario').textContent = "Añadir Producto";
    document.getElementById('btnGuardarForm').textContent = "Guardar Producto";
    document.getElementById('btnCancelarEdit').style.display = "none";
    document.getElementById('pIdModo').value = "";
    document.getElementById('formProducto').reset();
    document.getElementById('previewFotosContenedor').innerHTML = '';
    imagenesCargadasActuales = [];
  }

  function eliminarProducto(index) {
    if(confirm("¿Seguro que deseas quitar este producto?")) { 
      productos.splice(index, 1); 
      sincronizarProductosStorage();
      renderTabla(); 
    }
  }

  // --- SECCIÓN DE FUNCIONES NUBE ---

  async function cargarDesdeGitHub() {
    const token = CONFIG_GITHUB.getToken();
    if(!token) return;

    const statusTexto = document.getElementById('statusTexto');
    const url = `https://api.github.com/repos/${CONFIG_GITHUB.REPOSITORIO}/contents/productos.json`;
    
    try {
      const res = await fetch(url, {
        headers: { "Authorization": `token ${token}` }
      });
      if (res.ok) {
        const data = await res.json();
        const contenidoString = decodeURIComponent(escape(atob(data.content)));
        const datosLimpios = JSON.parse(contenidoString);
        
        if (datosLimpios.productos) productos = datosLimpios.productos;
        if (datosLimpios.categorias) categoriasValidas = datosLimpios.categorias;
        
        sincronizarProductosStorage();
        sincronizarCategoriasStorage();
        
        renderCategoriasUI();
        renderTabla();
        
        if(statusTexto) {
          statusTexto.innerHTML = "● CONECTADO EN TIEMPO REAL A GITHUB";
          statusTexto.style.color = "#2ecc71";
        }
      } else {
        if(statusTexto) {
          statusTexto.innerHTML = "● Modo Local (No se encontró productos.json en la nube, guarda para crearlo)";
          statusTexto.style.color = "#f1c40f";
        }
      }
    } catch (error) {
      console.error(error);
      if(statusTexto) {
        statusTexto.innerHTML = "● Error de conexión o Token inválido/revocado";
        statusTexto.style.color = "#e74c3c";
      }
    }
  }

  async function guardarArchivoEnGitHub(ruta, contenidoTexto, mensajeCommit) {
    const token = CONFIG_GITHUB.getToken();
    if(!token) throw new Error("Falta el Token de GitHub");

    const url = `https://api.github.com/repos/${CONFIG_GITHUB.REPOSITORIO}/contents/${ruta}`;
    let sha = null;
    
    try {
      const resSha = await fetch(url, {
        headers: { "Authorization": `token ${token}` }
      });
      if (resSha.ok) {
        const dataSha = await resSha.json();
        sha = dataSha.sha;
      }
    } catch (e) {}
    
    const bodyData = {
      message: mensajeCommit,
      content: btoa(unescape(encodeURIComponent(contenidoTexto)))
    };
    if (sha) bodyData.sha = sha;
    
    const resPut = await fetch(url, {
      method: "PUT",
      headers: {
        "Authorization": `token ${token}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify(bodyData)
    });
    
    if (!resPut.ok) {
      const errData = await resPut.json();
      throw new Error(errData.message || "Error al subir el archivo");
    }
  }

  async function publicarEnGitHub() {
    const btn = document.getElementById('btnCloudSync');
    const originalText = btn.innerHTML;
    btn.innerHTML = "⏳ Sincronizando datos en la nube...";
    btn.disabled = true;
    
    try {
      const datosNube = {
        productos: productos,
        categorias: categoriasValidas
      };
      await guardarArchivoEnGitHub("productos.json", JSON.stringify(datosNube, null, 2), "Actualización de base de datos desde el Panel Master");
      
      btn.innerHTML = "⏳ Actualizando catálogo público web...";
      const htmlCompletoCliente = generarCodigoHtmlCliente();
      await guardarArchivoEnGitHub("index.html", htmlCompletoCliente, "Actualización automática de catálogo público");
      
      alert("¡Éxito absoluto, Luis! Los cambios se han enviado a la nube. Tu catálogo web se actualizará por completo en unos segundos.");
    } catch (error) {
      console.error(error);
      alert("Hubo un error al intentar publicar: " + error.message + ". Verifica si tu token sigue activo.");
    } finally {
      btn.innerHTML = originalText;
      btn.disabled = false;
    }
  }

  renderCategoriasUI();
  renderTabla();
  // Cargar automáticamente si ya existe token en la memoria local
  if(localStorage.getItem('atarashi_cloud_token')) {
    cargarDesdeGitHub();
  }

  function descargarCatalogoCliente() {
    const codigoPaginaCliente = generarCodigoHtmlCliente();
    const blob = new Blob([codigoPaginaCliente], { type: "text/html" });
    const linkDescarga = document.createElement("a");
    linkDescarga.href = URL.createObjectURL(blob);
    linkDescarga.download = "index.html";
    linkDescarga.click();
  }
